font_family      Hack Nerd Font 
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size	     12
background_opacity 0.5 
dynamic_background_opacity yes

adjust_line_height  0
adjust_column_width 0

adjust_baseline 0

scrollback_lines 2000

map ctrl+shift+c copy_to_clipboard
map ctrl+v paste_from_clipboard

map page_up scroll_page_up
map page_down scroll_page_down

map home scroll_home
map end scroll_end

map alt+shift+j new_window
map alt+shift+l new_window

map alt+x close_window

map alt+j next_window
map alt+l next_window

map alt+k previous_window
map alt+h previous_window

map ctrl+shift+f7 focus_visible_window

map ctrl+equal change_font_size all +2.0
map ctrl+kp_add change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+kp_subtract change_font_size all -2.0

map f11 toggle_fullscreen

map alt+e edit_config_file

map ctrl+shift+down set_background_opacity +0.02
map ctrl+shift+up set_background_opacity -0.02

map alt+r load_config_file
